<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Sharing App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4"
    onload="getDb()">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">

        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">File Sharing</h1>
            <p id="dbStatus" class="text-sm text-gray-500">Connecting.......</p>
        </div>
        <div class="flex bg-gray-100 rounded-xl p-1">
            <button id="sendBtn" onclick="setMode('send')"
                class="w-1/2 py-2 rounded-lg font-medium bg-blue-600 text-white">
                Send
            </button>
            <button id="retrieveBtn" onclick="setMode('retrieve')"
                class="w-1/2 py-2 rounded-lg font-medium text-gray-600">
                Retrieve
            </button>
        </div><br>
        <div id="send" class="flex bg-gray-100 rounded-xl p-2 gap-2">
            <label class="flex items-center w-1/2 cursor-pointer p-2 rounded-lg bg-white">
                <input type="radio" name="sendMode" id="fileSendChk" onchange="sendMode('sendFile')"
                    class="mr-2 accent-blue-600" checked>
                <span class="font-medium">Send File</span>
            </label>

            <label class="flex items-center w-1/2 cursor-pointer p-2 rounded-lg bg-white">
                <input type="radio" name="sendMode" id="folderSendChk" onchange="sendMode('sendFolder')"
                    class="mr-2 accent-blue-600">
                <span class="font-medium">Send Folder</span>
            </label>
        </div>
        <div id="retrieve" class="flex bg-gray-100 rounded-xl p-2 gap-2 hidden">
            <label class="flex items-center w-1/2 cursor-pointer p-2 rounded-lg bg-white">
                <input type="radio" name="retrieveMode" id="fileChk" onchange="retrieveMode('retrieveFile')"
                    class="mr-2 accent-blue-600" checked>
                <span class="font-medium">Download File</span>
            </label>

            <label class="flex items-center w-1/2 cursor-pointer p-2 rounded-lg bg-white ">
                <input type="radio" name="retrieveMode" id="folderChk" onchange="retrieveMode('retrieveFolder')"
                    class="mr-2 accent-blue-600">
                <span class="font-medium">Download Folder</span>
            </label>
        </div>
<br><br>
        <div id="sendSection">
            <div id="uploadFile" class="space-y-6">
                <div
                    class="border-2 border-dashed border-gray-300 rounded-lg p-6 hover:border-indigo-500 transition-colors">
                    <label for="fileInput" class="block text-sm font-medium text-gray-700 mb-2">
                        Select File
                    </label>
                    <input type="file" id="fileInput" name="file" required
                        class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer">
                </div>

                <button type="button" onclick="uploadFile(event); return false;"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-lg shadow-md hover:shadow-lg transform hover:-translate-y-0.5 transition-all duration-200">
                    Upload File
                </button>
            </div>

            <div id="uploadFolder" class="space-y-6 hidden">
                <div
                    class="border-2 border-dashed border-gray-300 rounded-lg p-6 hover:border-indigo-500 transition-colors">
                    <label for="folderInput" class="block text-sm font-medium text-gray-700 mb-2">
                        Select Folder
                    </label>
                    <input type="file" id="folderInput" name="folder" webkitdirectory multiple required
                        class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer">
                </div>

                <button type="button" onclick="uploadFolder(event); return false;"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-lg shadow-md hover:shadow-lg transform hover:-translate-y-0.5 transition-all duration-200">
                    Upload Folder
                </button>
            </div>
        </div>
        <div id="retrieveSection" class="hidden">
            <div id="retrieveFileSection" class="space-y-4">
                <div id="retrieveFileBox"
                    class="border-2 border-dashed border-gray-300 rounded-lg p-6 hover:border-indigo-500 transition-colors">
                    <label for="retrieveFile" class="block text-sm font-medium text-gray-700 mb-2">
                        Enter File ID
                    </label>
                    <input type="text" id="retrieveFile" name="retrieveFile" required
                        placeholder="Paste your File ID here"
                        class="block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 text-sm" />
                </div>

                <button type="button" onclick="getFile(); return false;"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-lg shadow-md hover:shadow-lg transform hover:-translate-y-0.5 transition-all duration-200">
                    Download File
                </button>
            </div>
            <div id="retrieveFolderSection" class="space-y-6 hidden">
                <div id="retrieveFolderBox"
                    class="border-2 border-dashed border-gray-300 rounded-lg p-6 hover:border-indigo-500 transition-colors">
                    <label for="retrieveFolder" class="block text-sm font-medium text-gray-700 mb-2">
                        Enter Folder ID
                    </label>
                    <input type="text" id="retrieveFolder" name="retrieveFolder" required
                        placeholder="Paste your Folder ID here"
                        class="block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 text-sm" />
                </div>

                <button type="button" onclick="getFolder(); return false;"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-lg shadow-md hover:shadow-lg transform hover:-translate-y-0.5 transition-all duration-200">
                    Download Folder
                </button>
            </div>
        </div>

        <div id="responseContainer" class="mt-6 hidden">
            <div class="bg-green-50 border border-green-200 rounded-lg p-4">
                <p id="response" class="text-sm text-gray-700 mb-2"></p>
                <div id="fileIdContainer" class="hidden mt-3 text-center">
                    <p class="text-xs text-gray-500 mb-1">File ID</p>
                    <p id="fileId" class="text-4xl font-bold text-indigo-600"></p>
                </div>
            </div>
        </div>


    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            document.addEventListener('submit', function (e) {
                e.preventDefault();
                return false;
            });
        });

        let mode = "send";
        let sendModeState = "sendFile";
        let retrieveModeState = "retrieveFile";

        function setMode(selected) {
            mode = selected;

            const sendSection = document.getElementById('sendSection');
            const retrieveSection = document.getElementById('retrieveSection');
            const sendBtn = document.getElementById('sendBtn');
            const retrieveBtn = document.getElementById('retrieveBtn');
            const retrieve = document.getElementById('retrieve');
            const send = document.getElementById('send');


            if (mode === "send") {
                sendBtn.classList.add("bg-blue-600", "text-white");
                retrieveBtn.classList.remove("bg-blue-600", "text-white");
                sendSection.classList.remove('hidden');
                retrieveSection.classList.add('hidden');
                send.classList.remove('hidden');
                retrieve.classList.add('hidden');
            } else {
                sendBtn.classList.remove("bg-blue-600", "text-white");
                retrieveBtn.classList.add("bg-blue-600", "text-white");
                sendSection.classList.add('hidden');
                retrieveSection.classList.remove('hidden');
                send.classList.add('hidden');
                retrieve.classList.remove('hidden');
            }
        }

        function sendMode(selected) {
            sendModeState = selected;
            const file = document.getElementById('uploadFile');
            const folder = document.getElementById('uploadFolder');

            if (sendModeState === "sendFile") {
                file.classList.remove('hidden');
                folder.classList.add('hidden');
            } else {
                file.classList.add('hidden');
                folder.classList.remove('hidden');
            }

        }

        function retrieveMode(selected) {
            retrieveModeState = selected;
            const file = document.getElementById('retrieveFileSection');
            const folder = document.getElementById('retrieveFolderSection');

            if (retrieveModeState === "retrieveFile") {
                file.classList.remove('hidden');
                folder.classList.add('hidden');
            } else {
                file.classList.add('hidden');
                folder.classList.remove('hidden');
            }
        }
        async function getDb() {
            const res = document.getElementById('dbStatus');

            try {
                const response = await fetch("http://127.0.0.1:8000/check_db", {
                    method: "GET"
                });

                const result = await response.json();
                res.innerText = result.message;
                res.classList.remove('text-gray-500');
                res.classList.add('text-green-600', 'font-semibold');
            } catch (error) {
                console.error("DB Check Error:", error);
                res.innerText = "Error: " + error.message;
                res.classList.remove('text-gray-500');
                res.classList.add('text-red-600', 'font-semibold');
            }
        }

        async function uploadFile(event) {
            const input = document.getElementById('fileInput');
            const res = document.getElementById('response');
            const responseContainer = document.getElementById('responseContainer');
            const fileIdContainer = document.getElementById('fileIdContainer');
            const fileIdElement = document.getElementById('fileId');
            const file = input.files[0];

            if (!file) {
                responseContainer.classList.remove('hidden');
                responseContainer.innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                        <p class="text-sm text-red-700">Please select a file first</p>
                    </div>
                `;
                return false;
            }

            responseContainer.classList.remove('hidden');
            responseContainer.innerHTML = `
                <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
                    <p class="text-sm text-blue-700 flex items-center">
                        <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-blue-700" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        Uploading...
                    </p>
                </div>
            `;

            const formData = new FormData();
            formData.append("files", file);

            try {
                const response = await fetch("http://127.0.0.1:8000/Upload_file", {
                    method: "POST",
                    body: formData,
                });

                const result = await response.json();

                if (result.status === 'success') {
                    responseContainer.innerHTML = `
                        <div class="bg-green-50 border border-green-200 rounded-lg p-4">
                            <p class="text-sm text-gray-700 mb-3">${result.message}</p>
                            <div class="text-center border-t border-green-200 pt-3">
                                <p class="text-xs text-gray-500 mb-1">Your File ID</p>
                                <p class="text-5xl font-bold text-indigo-600 tracking-wider">${result.file_id}</p>
                                <p class="text-xs text-gray-500 mt-2">Save this ID to access your file later</p>
                            </div>
                        </div>
                    `;
                } else {
                    responseContainer.innerHTML = `
                        <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                            <p class="text-sm text-red-700">${result.message}</p>
                        </div>
                    `;
                }

                // console.log("Upload successful:", result);
            } catch (error) {
                console.error("Upload Error:", error);
                responseContainer.innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                        <p class="text-sm text-red-700">Upload failed: ${error.message}</p>
                    </div>
                `;
            }

            return false;
        }

        async function uploadFolder(event) {
            const input = document.getElementById('folderInput');
            const res = document.getElementById('response');
            const responseContainer = document.getElementById('responseContainer');
            const fileIdContainer = document.getElementById('fileIdContainer');
            const fileIdElement = document.getElementById('fileId');
            const files = input.files;

            if (!files || files.length === 0) {
                responseContainer.classList.remove('hidden');
                responseContainer.innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                        <p class="text-sm text-red-700">Please select a folder first</p>
                    </div>
                `;
                return false;
            }

            const formData = new FormData;
            for (let file of files) {
                formData.append("files", file);
                formData.append("paths", file.webkitRelativePath)
            }

            try {
                const response = await fetch("http://127.0.0.1:8000/Upload_folder", {
                    method: "POST",
                    body: formData
                })

                const result = await response.json();
                if (result.status === 'success') {
                    responseContainer.innerHTML = `
                        <div class="bg-green-50 border border-green-200 rounded-lg p-4">
                            <p class="text-sm text-gray-700 mb-3">${result.message}</p>
                            <div class="text-center border-t border-green-200 pt-3">
                                <p class="text-xs text-gray-500 mb-1">Your Folder ID</p>
                                <p class="text-5xl font-bold text-indigo-600 tracking-wider">${result.folder_id}</p>
                                <p class="text-xs text-gray-500 mt-2">Save this ID to access your folder later</p>
                            </div>
                        </div>
                    `;
                } else {
                    responseContainer.innerHTML = `
                        <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                            <p class="text-sm text-red-700">${result.message}</p>
                        </div>
                    `;
                }

                // console.log("Upload successful:", result);

            } catch (error) {
                // console.error("Upload Error:", error);
                responseContainer.innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                        <p class="text-sm text-red-700">Upload failed: ${error.message}</p>
                    </div>
                `;
            }
            return false;
        }

        async function getFile() {
            const retrieve = document.getElementById('retrieveFile').value.trim();
            const responseContainer = document.getElementById('responseContainer');
            if (!retrieve) {
                responseContainer.classList.remove('hidden');
                responseContainer.innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                        <p class="text-sm text-red-700">Please select a file id first</p>
                    </div>
                `;
                return false;
            }
            try {
                const response = await fetch(`http://127.0.0.1:8000/get_file/${retrieve}`, {
                    method: "GET"
                });
                if (!response.ok) {
                    const errorData = await response.json().catch(() => null);
                    responseContainer.innerHTML = `
                        <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                            <p class="text-sm text-red-700">${errorData?.detail || "Download Failed"} </p>
                        </div>
                    `;
                    return false;
                }

                const result = await response.blob();
                const url = window.URL.createObjectURL(result);
                window.open(url);
                const a = document.createElement("a");

                a.href = url;
                a.download = `file_${retrieve}`;
                document.body.appendChild(a);

                a.click();
                a.remove();
                setTimeout(() => {
                    window.URL.revokeObjectURL(url);
                    // console.log(result);
                }, 1000);
            } catch (error) {
                console.error(error)
                responseContainer.innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                        <p class="text-sm text-red-700">Upload failed: ${error.message}</p>
                    </div>
                `;
            }
            return false;
        }
        async function getFolder() {
            const retrieve = document.getElementById('retrieveFolder').value.trim();
            const responseContainer = document.getElementById('responseContainer');
            if (!retrieve) {
                responseContainer.classList.remove('hidden');
                responseContainer.innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                        <p class="text-sm text-red-700">Please select a file id first</p>
                    </div>
                `;
                return false;
            }
            try {
                const response = await fetch(`http://127.0.0.1:8000/get_folder/${retrieve}`, {
                    method: "GET"
                });
                if (!response.ok) {
                    const errorData = await response.json().catch(() => null);
                    responseContainer.innerHTML = `
                        <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                            <p class="text-sm text-red-700">${errorData?.detail || "Download Failed"} </p>
                        </div>
                    `;
                    return false;
                }
                const result = await response.blob();
                const url = window.URL.createObjectURL(result);
                window.open(url);
                const a = document.createElement("a");

                a.href = url;
                a.download = `folder_${retrieve}.zip`;
                document.body.appendChild(a);

                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
            } catch (error) {
                console.error(error)
                responseContainer.innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                        <p class="text-sm text-red-700">Upload failed: ${error.message}</p>
                    </div>
                `;
            }
            return false;
        }


    </script>
</body>

</html>
