<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File/Folder Sharing</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen px-4">

    <div class="w-full max-w-lg bg-white rounded-2xl shadow-lg p-6 sm:p-8 space-y-6">

        <h2 class="text-xl sm:text-2xl font-semibold text-center text-gray-800">
            File Transfer
        </h2>

        <!-- Toggle -->
        <div class="flex bg-gray-100 rounded-xl p-1">
            <button id="sendBtn" onclick="setMode('send')"
                class="w-1/2 py-2 rounded-lg font-medium bg-blue-600 text-white">
                Send
            </button>
            <button id="retrieveBtn" onclick="setMode('retrieve')"
                class="w-1/2 py-2 rounded-lg font-medium text-gray-600">
                Retrieve
            </button>
        </div>

        <!-- SEND SECTION -->
        <div id="sendSection" class="space-y-6">

            <!-- File Upload -->
            <form class="space-y-3 border p-4 rounded-xl">
                <h3 class="text-sm font-semibold text-gray-700">Upload File</h3>

                <input type="file" id="fileInput" class="block w-full text-sm text-gray-600
                    file:mr-4 file:py-2 file:px-4
                    file:rounded-lg file:border-0
                    file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">

                <button type="button" onclick="uploadFile(event)"
                    class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">
                    Upload File
                </button>
            </form>

            <!-- Folder Upload -->
            <form onsubmit="uploadFolder(event)" class="space-y-3 border p-4 rounded-xl">
                <h3 class="text-sm font-semibold text-gray-700">Upload Folder</h3>

                <input type="file" id="folderInput" webkitdirectory multiple class="block w-full text-sm text-gray-600
                    file:mr-4 file:py-2 file:px-4
                    file:rounded-lg file:border-0
                    file:bg-green-50 file:text-green-700 hover:file:bg-green-100">

                <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700">
                    Upload Folder
                </button>
            </form>

        </div>
        <div>
            <p id="response"></p>
        </div>

        <form id="retrieveSection" onsubmit="retrieveFile(event)" class="hidden space-y-4">

            <label class="text-sm font-medium text-gray-700">
                Enter File Code
            </label>

            <input type="text" id="codeInput" placeholder="Enter code..."
                class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">

            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">
                Retrieve File
            </button>

        </form>

    </div>

    <!-- Toast -->
    <!-- <div id="toast" class="hidden fixed bottom-5 right-5 max-w-sm bg-white shadow-xl rounded-lg overflow-hidden border">

        <div class="flex justify-between items-center px-4 py-3">
            <div class="flex items-center gap-2">
                <span id="toastIcon">🔔</span>
                <p id="toastMessage" class="text-sm text-gray-800"></p>
            </div>

            <button onclick="closeToast()" class="text-gray-500 hover:text-black text-lg">
                ✖
            </button>
        </div>

        <div id="toastBar" class="h-1 w-full"></div>
    </div> -->

    <script>
        let mode = "send";

        function setMode(selected) {
            mode = selected;

            const sendBtn = document.getElementById('sendBtn');
            const retrieveBtn = document.getElementById('retrieveBtn');
            const retrieveSection = document.getElementById('retrieveSection');
            const sendSection = document.getElementById('sendSection');

            if (mode === "send") {
                sendBtn.classList.add("bg-blue-600", "text-white");
                retrieveBtn.classList.remove("bg-blue-600", "text-white");
                retrieveSection.classList.add("hidden");
                sendSection.classList.remove("hidden");
            } else {
                retrieveBtn.classList.add("bg-blue-600", "text-white");
                sendBtn.classList.remove("bg-blue-600", "text-white");
                retrieveSection.classList.remove("hidden");
                sendSection.classList.add("hidden");
            }
        }


        async function uploadFolder(event) {
            event.preventDefault();

            const input = document.getElementById('folderInput');
            const files = input.files;
            const sendSection = document.getElementById('sendSection');

            const formData = new FormData();

            for (let file of files) {
                formData.append("files", file);
                formData.append("paths", file.webkitRelativePath);
            }

            const response = await fetch('http://127.0.0.1:8000/Upload_folder', {
                method: 'POST',
                body: formData
            });

            const result = await response.json();
            alert(result.message);
        }

        async function uploadFile(event) {
            event.preventDefault();

            const input = document.getElementById('fileInput');
            const sendSection = document.getElementById('sendSection');
            const res = document.getElementById('response');
            const formData = new FormData();

            formData.append("files", input.files[0]);

            const response = await fetch("http://127.0.0.1:8000/Upload_file", {
                method: 'POST',
                body: formData
            });
            const result = await response.json();

            if (result.status === 'success') {
                sendSection.classList.add("hidden");
                res.innerText = result.message;

            }
            alert(result.message + '\n The file id is:' + result.file_id);
        }

    </script>
</body>

</html>
